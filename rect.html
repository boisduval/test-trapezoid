<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手动绘制多边形 - 拖拽绘图版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; overflow: hidden; }
        #canvas-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 180px);
            background: white;
            cursor: crosshair;
            touch-action: none;
        }
        canvas { display: block; width: 100%; height: 100%; }
        .btn-action {
            @apply px-4 py-2 rounded-xl font-bold text-sm transition-all flex items-center gap-2 shadow-sm active:scale-95;
        }
        #edit-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
        }
    </style>
</head>
<body class="antialiased text-slate-900">

    <!-- 顶部状态栏 -->
    <div class="bg-white border-b border-slate-200 px-4 py-3 shadow-sm">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-lg md:text-xl font-black text-slate-800 tracking-tight">自定义形状绘制 (拖拽绘图)</h1>
                <p id="status-text" class="text-xs text-blue-600 font-medium italic">点击放置起点，然后从点拖出连线...</p>
            </div>
            <div class="text-right">
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">多边形面积</div>
                <div class="text-xl font-mono font-black text-emerald-600">
                    <span id="area-val">0</span> <small class="text-xs font-medium">u²</small>
                </div>
            </div>
        </div>
    </div>

    <!-- 画布区域 -->
    <div id="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>

    <!-- 长度修改模态框 -->
    <div id="edit-modal" class="bg-white p-6 rounded-2xl shadow-2xl border border-slate-200 w-72 text-center">
        <h3 class="text-sm font-bold text-slate-500 uppercase mb-3">修改边长 (px)</h3>
        <input type="number" id="new-length-input" inputmode="decimal" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg font-mono focus:ring-2 focus:ring-blue-500 outline-none mb-4" placeholder="输入长度...">
        <div class="flex gap-2">
            <button id="confirm-length" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold text-sm">确认</button>
            <button id="cancel-length" class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-lg font-bold text-sm">取消</button>
        </div>
    </div>

    <!-- 底部控制栏 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 p-4">
        <div class="max-w-6xl mx-auto flex flex-wrap gap-3 justify-center">
            <button id="btn-snap" class="btn-action bg-amber-100 text-amber-700 border border-amber-200">
                <span id="snap-icon" class="w-2 h-2 rounded-full bg-amber-500"></span>
                智能吸附: 开
            </button>
            <button id="btn-undo" class="btn-action bg-slate-100 text-slate-600 hover:bg-slate-200">
                撤销
            </button>
            <button id="btn-close" class="btn-action bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-30">
                闭合形状
            </button>
            <button id="btn-clear" class="btn-action bg-red-50 text-red-600 hover:bg-red-100">
                清空
            </button>
        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const areaText = document.getElementById('area-val');
        const statusText = document.getElementById('status-text');
        const btnClose = document.getElementById('btn-close');
        const btnUndo = document.getElementById('btn-undo');
        const btnClear = document.getElementById('btn-clear');
        const btnSnap = document.getElementById('btn-snap');
        const snapIcon = document.getElementById('snap-icon');
        
        const editModal = document.getElementById('edit-modal');
        const lengthInput = document.getElementById('new-length-input');
        const confirmBtn = document.getElementById('confirm-length');
        const cancelBtn = document.getElementById('cancel-length');

        // 数据状态
        let points = []; 
        let isClosed = false;
        let draggingIdx = -1;       // 正在编辑已有顶点
        let draggingSideIdx = -1;   // 正在移动整条边
        let isDrawingNew = false;   // 正在从最后一点拉出新线
        let tempEndPoint = null;    // 绘图时的临时吸附点
        
        let lastLogicPos = null;
        let selectedSideIdx = -1;
        let isSnapEnabled = true;
        let isModalOpen = false;

        let viewScale = 1;
        let viewOffsetX = 0;
        let viewOffsetY = 0;

        const hitRadius = 30; // 移动端增大判定
        const snapThreshold = 18; 
        const padding = 60;

        function init() {
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            canvas.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', handleEnd);

            canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e.touches[0]); }, {passive: false});
            window.addEventListener('touchmove', e => { handleMove(e.touches[0]); }, {passive: false});
            window.addEventListener('touchend', e => { handleEnd(e.changedTouches ? e.changedTouches[0] : e); });

            btnClose.addEventListener('click', () => { if(points.length >= 3) { isClosed = true; draw(); updateUI(); } });
            btnUndo.addEventListener('click', () => { 
                if(!isClosed) { points.pop(); } else { isClosed = false; }
                draw(); updateUI(); 
            });
            btnClear.addEventListener('click', () => { points = []; isClosed = false; isDrawingNew = false; draw(); updateUI(); });
            
            btnSnap.addEventListener('click', () => {
                isSnapEnabled = !isSnapEnabled;
                btnSnap.className = isSnapEnabled ? "btn-action bg-amber-100 text-amber-700 border border-amber-200" : "btn-action bg-slate-100 text-slate-400 border border-slate-200";
                snapIcon.className = isSnapEnabled ? "w-2 h-2 rounded-full bg-amber-500" : "w-2 h-2 rounded-full bg-slate-300";
                btnSnap.innerHTML = `<span class="${snapIcon.className}"></span> 智能吸附: ${isSnapEnabled ? '开' : '关'}`;
            });

            confirmBtn.addEventListener('click', applyNewLength);
            cancelBtn.addEventListener('click', hideModal);

            updateUI();
        }

        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            draw();
        }

        function updateViewport() {
            if (points.length === 0) { viewScale = 1; viewOffsetX = 0; viewOffsetY = 0; return; }
            const rect = container.getBoundingClientRect();
            const canvasW = rect.width, canvasH = rect.height;
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            points.forEach(p => { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y); });
            if (isDrawingNew && tempEndPoint) {
                minX = Math.min(minX, tempEndPoint.x); maxX = Math.max(maxX, tempEndPoint.x);
                minY = Math.min(minY, tempEndPoint.y); maxY = Math.max(maxY, tempEndPoint.y);
            }
            const shapeW = Math.max(maxX - minX, 1), shapeH = Math.max(maxY - minY, 1);
            viewScale = Math.min((canvasW - padding * 2) / shapeW, (canvasH - padding * 2) / shapeH, 1);
            viewOffsetX = canvasW / 2 - ((minX + maxX) / 2) * viewScale;
            viewOffsetY = canvasH / 2 - ((minY + maxY) / 2) * viewScale;
        }

        function logicToScreen(p) { return { x: p.x * viewScale + viewOffsetX, y: p.y * viewScale + viewOffsetY }; }
        function screenToLogic(pos) { return { x: (pos.x - viewOffsetX) / viewScale, y: (pos.y - viewOffsetY) / viewScale }; }
        function getMousePos(e) { const rect = canvas.getBoundingClientRect(); return { x: e.clientX - rect.left, y: e.clientY - rect.top }; }

        function getSnappedPosition(logicPos, ignoreIndices = []) {
            if (!isSnapEnabled || points.length === 0) return { ...logicPos, snaps: [] };
            let snappedX = logicPos.x, snappedY = logicPos.y, snaps = [];
            const adjThreshold = snapThreshold / viewScale;
            points.forEach((p, i) => {
                if (ignoreIndices.includes(i)) return;
                if (Math.abs(logicPos.x - p.x) < adjThreshold) { snappedX = p.x; if (!snaps.find(s => s.type === 'v')) snaps.push({ type: 'v', ref: p, x: p.x }); }
                if (Math.abs(logicPos.y - p.y) < adjThreshold) { snappedY = p.y; if (!snaps.find(s => s.type === 'h')) snaps.push({ type: 'h', ref: p, y: p.y }); }
            });
            return { x: snappedX, y: snappedY, snaps: snaps };
        }

        function handleStart(e) {
            if (isModalOpen) return;
            const screenPos = getMousePos(e);
            const logicPos = screenToLogic(screenPos);
            
            if (isClosed) {
                let fPt = -1;
                points.forEach((p, i) => { const sp = logicToScreen(p); if (Math.hypot(sp.x - screenPos.x, sp.y - screenPos.y) < hitRadius) fPt = i; });
                if (fPt !== -1) { draggingIdx = fPt; lastLogicPos = logicPos; }
                else { let side = getClickedSide(screenPos); if (side !== -1) { draggingSideIdx = side; lastLogicPos = logicPos; } }
            } else {
                if (points.length === 0) {
                    points.push(logicPos);
                } else {
                    const lastPtScreen = logicToScreen(points[points.length - 1]);
                    if (Math.hypot(lastPtScreen.x - screenPos.x, lastPtScreen.y - screenPos.y) < hitRadius) {
                        isDrawingNew = true;
                        tempEndPoint = logicPos;
                    }
                }
            }
            draw();
        }

        function handleMove(e) {
            if (isModalOpen) return;
            const screenPos = getMousePos(e);
            const logicPos = screenToLogic(screenPos);
            
            if (draggingIdx !== -1) {
                const snapped = getSnappedPosition(logicPos, [draggingIdx]);
                points[draggingIdx] = { x: snapped.x, y: snapped.y };
                draw(snapped);
            } else if (draggingSideIdx !== -1) {
                const dx = logicPos.x - lastLogicPos.x, dy = logicPos.y - lastLogicPos.y;
                const i1 = draggingSideIdx, i2 = (draggingSideIdx + 1) % points.length;
                points[i1].x += dx; points[i1].y += dy; points[i2].x += dx; points[i2].y += dy;
                lastLogicPos = logicPos;
                draw();
            } else if (isDrawingNew) {
                const snapped = getSnappedPosition(logicPos);
                tempEndPoint = { x: snapped.x, y: snapped.y };
                draw(snapped);
            }
            updateUI();
        }

        function handleEnd(e) {
            if (isDrawingNew && tempEndPoint) {
                const screenPos = getMousePos(e);
                const firstPtScreen = logicToScreen(points[0]);
                if (points.length >= 3 && Math.hypot(firstPtScreen.x - screenPos.x, firstPtScreen.y - screenPos.y) < hitRadius) {
                    isClosed = true;
                } else {
                    points.push({...tempEndPoint});
                }
                isDrawingNew = false;
                tempEndPoint = null;
            } else if (draggingSideIdx !== -1 && lastLogicPos) {
                const travel = Math.hypot(screenToLogic(getMousePos(e)).x - lastLogicPos.x, screenToLogic(getMousePos(e)).y - lastLogicPos.y);
                if (travel < 5) { selectedSideIdx = draggingSideIdx; showModal(points[selectedSideIdx], points[(selectedSideIdx + 1) % points.length]); }
            }
            draggingIdx = -1; draggingSideIdx = -1; isDrawingNew = false; draw(); updateUI();
        }

        function getClickedSide(screenPos) {
            for (let i = 0; i < points.length; i++) {
                const p1 = logicToScreen(points[i]), p2 = logicToScreen(points[(i + 1) % points.length]);
                if (pointToSegmentDist(screenPos, p1, p2) < 20) return i;
            }
            return -1;
        }

        function pointToSegmentDist(p, a, b) {
            let l2 = Math.hypot(a.x - b.x, a.y - b.y)**2;
            if (l2 === 0) return Math.hypot(p.x - a.x, p.y - a.y);
            let t = Math.max(0, Math.min(1, ((p.x - a.x) * (b.x - a.x) + (p.y - a.y) * (b.y - a.y)) / l2));
            return Math.hypot(p.x - (a.x + t * (b.x - a.x)), p.y - (a.y + t * (b.y - a.y)));
        }

        function showModal(p1, p2) { lengthInput.value = Math.round(Math.hypot(p1.x - p2.x, p1.y - p2.y)); editModal.style.display = 'block'; isModalOpen = true; setTimeout(() => lengthInput.focus(), 50); }
        function hideModal() { editModal.style.display = 'none'; isModalOpen = false; selectedSideIdx = -1; }
        function applyNewLength() {
            const newLen = parseFloat(lengthInput.value);
            if (isNaN(newLen) || newLen <= 0 || selectedSideIdx === -1) { hideModal(); return; }
            const i = selectedSideIdx, j = (i + 1) % points.length, p1 = points[i], p2 = points[j];
            const dx = p2.x - p1.x, dy = p2.y - p1.y, oldLen = Math.hypot(dx, dy);
            if (oldLen > 0.1) {
                const ratio = newLen / oldLen;
                if (j !== 0) { const sx = (p1.x + dx * ratio) - p2.x, sy = (p1.y + dy * ratio) - p2.y; for (let k = j; k < points.length; k++) { points[k].x += sx; points[k].y += sy; } }
                else { const idx = p1.x - p2.x, idy = p1.y - p2.y; points[i].x = p2.x + idx * ratio; points[i].y = p2.y + idy * ratio; }
            }
            hideModal(); draw(); updateUI();
        }

        function updateUI() {
            let area = 0;
            if (points.length >= 3 && isClosed) {
                for (let i = 0; i < points.length; i++) { let j = (i + 1) % points.length; area += points[i].x * points[j].y - points[j].x * points[i].y; }
                area = Math.abs(area) / 2;
            }
            areaText.textContent = Math.round(area).toLocaleString();
            if (isClosed) statusText.textContent = "已闭合。拖动顶点或边，点击边可修改数值。";
            else if (points.length === 0) statusText.textContent = "点击画布放置起点。";
            else statusText.textContent = "按住最后一点并拖动来拉出新连线。";
            btnClose.disabled = points.length < 3;
        }

        function draw(snappedInfo = null) {
            const rect = canvas.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);
            updateViewport();
            if (points.length === 0) return;

            // 1. 十字对齐线
            if (snappedInfo && snappedInfo.snaps && snappedInfo.snaps.length > 0) {
                ctx.save(); ctx.setLineDash([3, 3]); ctx.lineWidth = 1;
                snappedInfo.snaps.forEach(snap => {
                    const sp = logicToScreen(snap.ref); ctx.beginPath(); ctx.strokeStyle = '#f59e0b';
                    if (snap.type === 'h') { ctx.moveTo(0, sp.y); ctx.lineTo(rect.width, sp.y); }
                    else { ctx.moveTo(sp.x, 0); ctx.lineTo(sp.x, rect.height); }
                    ctx.stroke(); ctx.beginPath(); ctx.arc(sp.x, sp.y, 4, 0, Math.PI*2); ctx.stroke();
                });
                ctx.restore();
            }

            // 2. 填充与轮廓
            ctx.beginPath();
            const p0 = logicToScreen(points[0]);
            ctx.moveTo(p0.x, p0.y);
            points.forEach(p => { const sp = logicToScreen(p); ctx.lineTo(sp.x, sp.y); });
            if (isDrawingNew && tempEndPoint) { const sp = logicToScreen(tempEndPoint); ctx.lineTo(sp.x, sp.y); }
            if (isClosed) ctx.closePath();

            if (isClosed) { ctx.fillStyle = 'rgba(16, 185, 129, 0.05)'; ctx.fill(); }
            
            ctx.strokeStyle = isClosed ? '#10b981' : (isDrawingNew ? '#f59e0b' : '#3b82f6');
            ctx.lineWidth = 3;
            if (!isClosed) ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);

            // 3. 长度标注
            for (let i = 0; i < points.length; i++) {
                let j = (i + 1) % points.length;
                if (isClosed || i < points.length - 1) drawLengthLabel(points[i], points[j]);
            }
            if (isDrawingNew && tempEndPoint) drawLengthLabel(points[points.length-1], tempEndPoint);

            // 4. 顶点
            points.forEach((p, i) => {
                const sp = logicToScreen(p);
                ctx.beginPath(); ctx.arc(sp.x, sp.y, isClosed ? 6 : (i === points.length-1 ? 10 : 4), 0, Math.PI * 2);
                ctx.fillStyle = isClosed ? '#3b82f6' : (i === 0 && points.length >= 3 ? '#ef4444' : (i === points.length-1 ? 'rgba(59, 130, 246, 0.2)' : '#3b82f6'));
                ctx.fill();
                if (i === points.length - 1 && !isClosed) { ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2; ctx.stroke(); ctx.beginPath(); ctx.arc(sp.x, sp.y, 4, 0, Math.PI*2); ctx.fillStyle='#3b82f6'; ctx.fill(); }
                ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
            });
        }

        function drawLengthLabel(lp1, lp2) {
            const p1 = logicToScreen(lp1), p2 = logicToScreen(lp2);
            const midX = (p1.x + p2.x) / 2, midY = (p1.y + p2.y) / 2;
            const logicLen = Math.round(Math.hypot(lp1.x - lp2.x, lp1.y - lp2.y));
            ctx.save(); ctx.font = '10px font-mono'; ctx.textAlign = 'center';
            const txt = logicLen.toString(); const tw = ctx.measureText(txt).width;
            ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.fillRect(midX - tw/2 - 2, midY - 6, tw + 4, 12);
            ctx.fillStyle = '#64748b'; ctx.fillText(txt, midX, midY + 4); ctx.restore();
        }

        init();
    </script>
</body>
</html>
