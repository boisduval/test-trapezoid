<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手动绘制多边形 - 十字全对齐版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; overflow: hidden; }
        #canvas-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 180px);
            background: white;
            cursor: crosshair;
            touch-action: none;
        }
        canvas { display: block; width: 100%; height: 100%; }
        .btn-action {
            @apply px-4 py-2 rounded-xl font-bold text-sm transition-all flex items-center gap-2 shadow-sm active:scale-95;
        }
        #edit-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
        }
    </style>
</head>
<body class="antialiased text-slate-900">

    <!-- 顶部状态栏 -->
    <div class="bg-white border-b border-slate-200 px-4 py-3 shadow-sm">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-lg md:text-xl font-black text-slate-800 tracking-tight">自定义形状绘制 (十字全对齐)</h1>
                <p id="status-text" class="text-xs text-blue-600 font-medium italic">点击画布开始绘制...</p>
            </div>
            <div class="text-right">
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">多边形面积</div>
                <div class="text-xl font-mono font-black text-emerald-600">
                    <span id="area-val">0</span> <small class="text-xs font-medium">px²</small>
                </div>
            </div>
        </div>
    </div>

    <!-- 画布区域 -->
    <div id="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>

    <!-- 长度修改模态框 -->
    <div id="edit-modal" class="bg-white p-6 rounded-2xl shadow-2xl border border-slate-200 w-72 text-center">
        <h3 class="text-sm font-bold text-slate-500 uppercase mb-3">修改边长 (px)</h3>
        <input type="number" id="new-length-input" inputmode="decimal" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg font-mono focus:ring-2 focus:ring-blue-500 outline-none mb-4" placeholder="输入长度...">
        <div class="flex gap-2">
            <button id="confirm-length" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold text-sm">确认</button>
            <button id="cancel-length" class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-lg font-bold text-sm">取消</button>
        </div>
    </div>

    <!-- 底部控制栏 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 p-4">
        <div class="max-w-6xl mx-auto flex flex-wrap gap-3 justify-center">
            <button id="btn-snap" class="btn-action bg-amber-100 text-amber-700 border border-amber-200">
                <span id="snap-icon" class="w-2 h-2 rounded-full bg-amber-500"></span>
                智能吸附: 开
            </button>
            <button id="btn-undo" class="btn-action bg-slate-100 text-slate-600 hover:bg-slate-200">
                撤销
            </button>
            <button id="btn-close" class="btn-action bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-30">
                闭合形状
            </button>
            <button id="btn-clear" class="btn-action bg-red-50 text-red-600 hover:bg-red-100">
                清空
            </button>
        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const areaText = document.getElementById('area-val');
        const statusText = document.getElementById('status-text');
        const btnClose = document.getElementById('btn-close');
        const btnUndo = document.getElementById('btn-undo');
        const btnClear = document.getElementById('btn-clear');
        const btnSnap = document.getElementById('btn-snap');
        const snapIcon = document.getElementById('snap-icon');
        
        const editModal = document.getElementById('edit-modal');
        const lengthInput = document.getElementById('new-length-input');
        const confirmBtn = document.getElementById('confirm-length');
        const cancelBtn = document.getElementById('cancel-length');

        let points = [];
        let isClosed = false;
        let draggingIdx = -1;
        let selectedSideIdx = -1;
        let isSnapEnabled = true;
        let isModalOpen = false;
        const hitRadius = 20;
        const snapThreshold = 18; // 略微调小，防止误吸附

        function init() {
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            canvas.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', handleEnd);

            canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e.touches[0]); }, {passive: false});
            window.addEventListener('touchmove', e => { handleMove(e.touches[0]); }, {passive: false});
            window.addEventListener('touchend', handleEnd);

            btnClose.addEventListener('click', () => { if(points.length >= 3) { isClosed = true; draw(); updateUI(); } });
            btnUndo.addEventListener('click', () => { 
                if(!isClosed) { points.pop(); } else { isClosed = false; }
                draw(); updateUI(); 
            });
            btnClear.addEventListener('click', () => { points = []; isClosed = false; draw(); updateUI(); });
            
            btnSnap.addEventListener('click', () => {
                isSnapEnabled = !isSnapEnabled;
                btnSnap.className = isSnapEnabled ? 
                    "btn-action bg-amber-100 text-amber-700 border border-amber-200" : 
                    "btn-action bg-slate-100 text-slate-400 border border-slate-200";
                snapIcon.className = isSnapEnabled ? "w-2 h-2 rounded-full bg-amber-500" : "w-2 h-2 rounded-full bg-slate-300";
                btnSnap.innerHTML = `<span class="${snapIcon.className}"></span> 智能吸附: ${isSnapEnabled ? '开' : '关'}`;
            });

            confirmBtn.addEventListener('click', applyNewLength);
            cancelBtn.addEventListener('click', hideModal);

            updateUI();
        }

        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            draw();
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        /**
         * 智能吸附逻辑：扫描所有顶点，寻找最合适的 X 和 Y 对齐参考
         */
        function getSnappedPosition(pos, targetIdx = -1) {
            if (!isSnapEnabled || points.length === 0) return { ...pos, snaps: [] };

            let snappedX = pos.x;
            let snappedY = pos.y;
            let snaps = []; // 存储所有生效的对齐参考

            // 1. 寻找 X 坐标对齐 (垂直辅助线)
            let minDistX = snapThreshold;
            points.forEach((p, i) => {
                if (i === targetIdx) return;
                const d = Math.abs(pos.x - p.x);
                if (d < minDistX) {
                    minDistX = d;
                    snappedX = p.x;
                    // 记录参考点
                    const existing = snaps.find(s => s.type === 'v');
                    if (existing) existing.ref = p;
                    else snaps.push({ type: 'v', ref: p, x: p.x });
                }
            });

            // 2. 寻找 Y 坐标对齐 (水平辅助线)
            let minDistY = snapThreshold;
            points.forEach((p, i) => {
                if (i === targetIdx) return;
                const d = Math.abs(pos.y - p.y);
                if (d < minDistY) {
                    minDistY = d;
                    snappedY = p.y;
                    const existing = snaps.find(s => s.type === 'h');
                    if (existing) existing.ref = p;
                    else snaps.push({ type: 'h', ref: p, y: p.y });
                }
            });

            return { x: snappedX, y: snappedY, snaps: snaps };
        }

        function handleStart(e) {
            if (isModalOpen) return;
            const rawPos = getMousePos(e);
            
            if (isClosed) {
                let foundPoint = -1;
                points.forEach((p, i) => {
                    if (Math.hypot(p.x - rawPos.x, p.y - rawPos.y) < hitRadius) foundPoint = i;
                });
                if (foundPoint !== -1) {
                    draggingIdx = foundPoint;
                } else {
                    checkSideClick(rawPos);
                }
            } else {
                const snapped = getSnappedPosition(rawPos);
                if (points.length >= 3 && Math.hypot(points[0].x - snapped.x, points[0].y - snapped.y) < hitRadius) {
                    isClosed = true;
                } else {
                    points.push({x: snapped.x, y: snapped.y});
                }
            }
            draw();
            updateUI();
        }

        function handleMove(e) {
            if (isModalOpen) return;
            const rawPos = getMousePos(e);
            
            if (draggingIdx !== -1) {
                const snapped = getSnappedPosition(rawPos, draggingIdx);
                points[draggingIdx] = { x: snapped.x, y: snapped.y };
                draw(snapped);
                updateUI();
            } else if (!isClosed && points.length > 0) {
                const snapped = getSnappedPosition(rawPos);
                draw(snapped);
            }
        }

        function handleEnd() {
            draggingIdx = -1;
            draw();
        }

        function checkSideClick(pos) {
            for (let i = 0; i < points.length; i++) {
                let j = (i + 1) % points.length;
                let dist = pointToSegmentDist(pos, points[i], points[j]);
                if (dist < 15) {
                    selectedSideIdx = i;
                    showModal(points[i], points[j]);
                    return;
                }
            }
        }

        function pointToSegmentDist(p, a, b) {
            let l2 = Math.hypot(a.x - b.x, a.y - b.y)**2;
            if (l2 === 0) return Math.hypot(p.x - a.x, p.y - a.y);
            let t = Math.max(0, Math.min(1, ((p.x - a.x) * (b.x - a.x) + (p.y - a.y) * (b.y - a.y)) / l2));
            return Math.hypot(p.x - (a.x + t * (b.x - a.x)), p.y - (a.y + t * (b.y - a.y)));
        }

        function showModal(p1, p2) {
            lengthInput.value = Math.round(Math.hypot(p1.x - p2.x, p1.y - p2.y));
            editModal.style.display = 'block';
            isModalOpen = true;
            setTimeout(() => lengthInput.focus(), 50);
        }

        function hideModal() {
            editModal.style.display = 'none';
            isModalOpen = false;
            selectedSideIdx = -1;
        }

        function applyNewLength() {
            const newLen = parseFloat(lengthInput.value);
            if (isNaN(newLen) || newLen <= 0 || selectedSideIdx === -1) {
                hideModal();
                return;
            }

            const i = selectedSideIdx, j = (i + 1) % points.length;
            const p1 = points[i], p2 = points[j];
            const dx = p2.x - p1.x, dy = p2.y - p1.y, oldLen = Math.hypot(dx, dy);

            if (oldLen > 0.1) {
                const ratio = newLen / oldLen;
                if (j !== 0) {
                    const shiftX = (p1.x + dx * ratio) - p2.x, shiftY = (p1.y + dy * ratio) - p2.y;
                    for (let k = j; k < points.length; k++) {
                        points[k].x += shiftX; points[k].y += shiftY;
                    }
                } else {
                    const invDx = p1.x - p2.x, invDy = p1.y - p2.y;
                    points[i].x = p2.x + invDx * ratio; points[i].y = p2.y + invDy * ratio;
                }
            }
            hideModal(); draw(); updateUI();
        }

        function updateUI() {
            areaText.textContent = Math.round(calculateArea()).toLocaleString();
            if (isClosed) {
                statusText.textContent = "已闭合。拖动端点或点击边线修改长度。";
                btnClose.disabled = true;
            } else {
                statusText.textContent = points.length === 0 ? "点击开始绘制..." : "双向吸附已开启，移动光标寻找对齐线。";
                btnClose.disabled = points.length < 3;
            }
        }

        function calculateArea() {
            if (points.length < 3 || !isClosed) return 0;
            let area = 0;
            for (let i = 0; i < points.length; i++) {
                let j = (i + 1) % points.length;
                area += points[i].x * points[j].y - points[j].x * points[i].y;
            }
            return Math.abs(area) / 2;
        }

        function draw(snappedInfo = null) {
            const rect = canvas.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);
            if (points.length === 0) return;

            // 1. 绘制所有生效的对齐辅助线 (十字星)
            if (snappedInfo && snappedInfo.snaps && snappedInfo.snaps.length > 0) {
                ctx.save();
                ctx.setLineDash([3, 3]);
                ctx.lineWidth = 1;
                snappedInfo.snaps.forEach(snap => {
                    ctx.beginPath();
                    ctx.strokeStyle = '#f59e0b';
                    if (snap.type === 'h') {
                        ctx.moveTo(0, snap.y); ctx.lineTo(rect.width, snap.y);
                    } else {
                        ctx.moveTo(snap.x, 0); ctx.lineTo(snap.x, rect.height);
                    }
                    ctx.stroke();
                    
                    // 在参考点画一个小圈
                    ctx.beginPath();
                    ctx.arc(snap.ref.x, snap.ref.y, 4, 0, Math.PI*2);
                    ctx.stroke();
                });
                ctx.restore();
            }

            // 2. 填充
            if (isClosed) {
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                points.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.closePath();
                ctx.fillStyle = 'rgba(16, 185, 129, 0.05)';
                ctx.fill();
            }

            // 3. 边线
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 0; i < points.length; i++) {
                let j = (i + 1) % points.length;
                if (!isClosed && i === points.length - 1) {
                    if (snappedInfo) ctx.lineTo(snappedInfo.x, snappedInfo.y);
                } else {
                    ctx.lineTo(points[j].x, points[j].y);
                    drawLengthLabel(points[i], points[j]);
                }
            }
            
            // 如果处于吸附状态且不是闭合态，使用提示色
            const isAnySnapped = snappedInfo && snappedInfo.snaps && snappedInfo.snaps.length > 0;
            ctx.strokeStyle = (isAnySnapped && !isClosed) ? '#f59e0b' : (isClosed ? '#10b981' : '#3b82f6');
            ctx.lineWidth = 3;
            if (!isClosed) ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);

            // 4. 顶点
            points.forEach((p, i) => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, isClosed ? 6 : 4, 0, Math.PI * 2);
                ctx.fillStyle = isClosed ? '#3b82f6' : (i === 0 && points.length >= 3 ? '#ef4444' : '#3b82f6');
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }

        function drawLengthLabel(p1, p2) {
            const midX = (p1.x + p2.x) / 2, midY = (p1.y + p2.y) / 2;
            const len = Math.round(Math.hypot(p1.x - p2.x, p1.y - p2.y));
            ctx.save();
            ctx.font = '10px font-mono';
            ctx.textAlign = 'center';
            const tw = ctx.measureText(len).width;
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fillRect(midX - tw/2 - 2, midY - 6, tw + 4, 12);
            ctx.fillStyle = '#64748b';
            ctx.fillText(len, midX, midY + 4);
            ctx.restore();
        }

        init();
    </script>
</body>
</html>
